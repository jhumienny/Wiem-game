<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EGO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e12;--card:#18181f;--rim:#26262f;--text:#f0eef8;--muted:#6a6a80;
  --c0:#ff4d4d;--c1:#4d8dff;--c2:#3dd68c;--c3:#ffb830;--rad:16px;
}
[data-theme="light"]{
  --bg:#f0eff8;--card:#ffffff;--rim:#dddbe8;--text:#12111a;--muted:#7a7890;
}
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0eff8;--card:#ffffff;--rim:#dddbe8;--text:#12111a;--muted:#7a7890;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;justify-content:center;min-height:100dvh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--rim) 1px,transparent 1px),linear-gradient(90deg,var(--rim) 1px,transparent 1px);background-size:32px 32px;opacity:.18;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;width:100%;max-width:440px;min-height:100dvh;display:flex;flex-direction:column;}
.scr{display:none;flex-direction:column;flex:1;padding:20px 16px 32px;gap:16px;animation:pop .28s ease;}
.scr.on{display:flex;}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.logo{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:2px;line-height:1;}
.logo em{color:var(--c0);font-style:normal;}
.sub{color:var(--muted);font-size:13px;}
.label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.field{background:var(--card);border:1.5px solid var(--rim);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:10px;}
.field label{font-size:13px;color:var(--muted);white-space:nowrap;}
.field input{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);}
.field input::placeholder{color:var(--muted);}

/* setup screen */
.setup-card{background:var(--card);border:1.5px solid var(--rim);border-radius:var(--rad);padding:20px;}
.setup-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--rim);}
.setup-step:last-child{border-bottom:none;}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--c0);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:14px;line-height:1.5;}
.step-txt a{color:var(--c1);text-decoration:none;}
.step-txt code{background:var(--rim);padding:2px 6px;border-radius:5px;font-size:12px;color:var(--c2);}

/* slot grid */
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.slot{background:var(--card);border:2px solid var(--rim);border-radius:var(--rad);padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
.slot:active{transform:scale(.96);}
.slot.taken{opacity:.4;pointer-events:none;}
.slot-av{width:48px;height:48px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;}
.slot-name{font-size:14px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slot-pts{font-size:12px;color:var(--muted);}
.slot-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
.sb-you{background:var(--text);color:var(--bg);}
.sb-free{background:var(--rim);color:var(--muted);}

.codebox{background:var(--card);border:1.5px solid var(--rim);border-radius:var(--rad);padding:20px;text-align:center;}
.codelbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.codelink{font-size:13px;color:var(--c1);word-break:break-all;line-height:1.5;cursor:pointer;}
.codesub{font-size:11px;color:var(--muted);margin-top:8px;}
.sbar{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:8px 10px;}
.sbi{flex:1;text-align:center;}
.sbi-n{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sbi-v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.plist{display:flex;flex-direction:column;gap:8px;}
.prow{background:var(--card);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:500;}
.prow-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ptag{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
.tag-host{background:var(--text);color:var(--bg);}
.tag-you{background:var(--rim);color:var(--muted);}
.rrow-cfg{background:var(--card);border:1.5px solid var(--rim);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.rrow-cfg label{flex:1;font-size:14px;color:var(--muted);}
.rrow-cfg input{width:52px;text-align:right;background:none;border:none;outline:none;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);}
.qcard{background:var(--card);border:1.5px solid var(--rim);border-radius:var(--rad);padding:22px 18px;position:relative;overflow:hidden;}
.qcard::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:var(--ac,#ff4d4d);opacity:.07;}
.qmeta{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.qabout{font-size:13px;color:var(--muted);margin-bottom:6px;}
.qabout strong{color:var(--text);}
.qtext{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.5px;line-height:1.35;}
.ans-list{display:flex;flex-direction:column;gap:9px;}
.abtn{background:var(--card);border:2px solid var(--rim);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);text-align:left;width:100%;}
.abtn:not(.locked):active{transform:scale(.98);background:var(--rim);}
.anum{width:36px;height:36px;border-radius:9px;background:var(--rim);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;flex-shrink:0;transition:all .15s;}
.abtn.locked{pointer-events:none;}
.abtn.chosen{border-color:var(--text);}
.abtn.chosen .anum{background:var(--text);color:var(--bg);}
.abtn.correct{border-color:var(--c2);}
.abtn.correct .anum{background:var(--c2);color:var(--bg);}
.voter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.vchip{font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;}
.wmid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:20px 0;}
.wav{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:32px;margin:0 auto;}
.wtitle{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.wdesc{font-size:14px;color:var(--muted);line-height:1.6;max-width:260px;}
.wq{background:var(--card);border:1px solid var(--rim);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--muted);font-style:italic;line-height:1.5;max-width:300px;}
.pulse{animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.rcard{background:var(--card);border:1.5px solid var(--rim);border-radius:var(--rad);padding:16px;}
.rctitle{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.5px;margin-bottom:12px;}
.rvrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--rim);font-size:14px;}
.rvrow:last-child{border-bottom:none;}
.rvl{display:flex;align-items:center;gap:8px;}
.rvdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
.b-yes{background:#1a3d2b;color:var(--c2);}
.b-no{background:#2d1a1a;color:var(--c0);}
.b-sub{background:var(--text);color:var(--bg);}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:6px;}
.podcol{flex:1;text-align:center;}
.podbar{border-radius:8px 8px 0 0;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.vstatus{text-align:center;font-size:13px;color:var(--muted);min-height:20px;}
.conn{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dok{background:var(--c2);}
.dwait{background:var(--c3);animation:blink .9s infinite;}
.derr{background:var(--c0);}
.btn{border-radius:12px;padding:15px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .15s;text-align:center;width:100%;display:block;}
.btn:active{transform:scale(.98);}
.btn-lit{background:var(--text);color:var(--bg);}
.btn-dim{background:var(--card);color:var(--text);border:1.5px solid var(--rim);}
.brow{display:flex;gap:8px;}
.brow .btn{flex:1;}
.err-msg{color:var(--c0);font-size:13px;text-align:center;display:none;padding:4px 0;}
.maxp-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--rim);background:var(--card);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;transition:all .15s;}
.maxp-btn:active{transform:scale(.95);}
.maxp-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.theme-btn{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:10px;border:1.5px solid var(--rim);background:var(--card);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .15s;}
.theme-btn:active{transform:scale(.95);}
</style>
</head>
<body>
<div class="app">

<!-- ══ HOME ══ -->
<div class="scr on" id="s-home">
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Zmień motyw">🌙</button>

  <div style="padding-top:24px">
    <div class="logo">EGO<em>.</em></div>
    <div class="sub">Kto zna cię najlepiej?</div>
  </div>

  <!-- Imię + dołącz -->
  <div style="background:var(--card);border:1.5px solid var(--rim);border-radius:var(--rad);padding:18px;display:flex;flex-direction:column;gap:12px;">
    <div class="field" style="background:var(--bg)">
      <label style="font-size:13px;color:var(--muted);white-space:nowrap">Imię:</label>
      <input id="inp-name" type="text" placeholder="Twoje imię" maxlength="14" autocomplete="off"
        style="font-size:16px;font-weight:600;">
    </div>
    <div style="height:1px;background:var(--rim)"></div>
    <div class="field" style="background:var(--bg)">
      <label style="font-size:13px;color:var(--muted);white-space:nowrap">Kod:</label>
      <input id="inp-code" type="text" placeholder="np. AB3K"
        style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:6px;text-transform:uppercase;"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')joinGame()">
    </div>
    <button class="btn btn-dim" onclick="joinGame()">→ Dołącz do gry</button>
  </div>

  <button class="btn btn-lit" onclick="createGame()">🎮 Utwórz nową grę</button>

  <div class="err-msg" id="home-err"></div>

</div>

<!-- ══ SLOT PICK ══ -->
<div class="scr" id="s-slots">
  <div style="padding-top:12px">
    <div class="logo" style="font-size:42px">EGO<em>.</em></div>
    <div class="sub" id="slots-sub">Wybierz swój slot</div>
  </div>
  <div class="field">
    <label style="font-size:13px;color:var(--muted);white-space:nowrap">Imię:</label>
    <input id="slots-name-inp" type="text" placeholder="Twoje imię" maxlength="14" autocomplete="off" style="font-size:16px;font-weight:600;">
    <button onclick="changeSlotName()" style="background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:6px 12px;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0">Zmień</button>
  </div>
  <div class="slot-grid" id="slot-grid"></div>
  <div class="conn" id="slots-conn"><span class="cdot dwait"></span>Ładowanie…</div>
</div>

<!-- ══ LOBBY ══ -->
<div class="scr" id="s-lobby">
  <div style="padding-top:12px">
    <div class="logo" style="font-size:42px">EGO<em>.</em></div>
  </div>
  <div class="codebox">
    <div class="codelbl">Kod gry — wyślij znajomym</div>
    <div class="codelink" id="lob-code" onclick="copyCode()">----</div>
    <div class="codesub">Kliknij aby skopiować · Każdy wpisuje kod w aplikacji</div>
  </div>
  <div class="label" id="lob-cnt">Gracze (0/4)</div>
  <div class="plist" id="lob-list"></div>

  <!-- Name change row -->
  <div class="field" id="lob-name-row" style="display:none">
    <label>Twoje imię:</label>
    <input id="lob-name-inp" type="text" maxlength="14" autocomplete="off" placeholder="Zmień imię">
    <button onclick="changeName()" style="background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:6px 12px;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0">OK</button>
  </div>

  <!-- Ready button (everyone) -->
  <button class="btn" id="btn-ready" style="display:none" onclick="toggleReady()"></button>

  <!-- Host controls -->
  <div id="lob-host" style="display:none;flex-direction:column;gap:10px;">
    <div class="rrow-cfg">
      <label>Liczba graczy</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="maxp-btn" data-n="2" onclick="setMaxPlayers(2)">2</button>
        <button class="maxp-btn" data-n="3" onclick="setMaxPlayers(3)">3</button>
        <button class="maxp-btn" data-n="4" onclick="setMaxPlayers(4)">4</button>
        <button class="maxp-btn" data-n="5" onclick="setMaxPlayers(5)">5</button>
        <button class="maxp-btn" data-n="6" onclick="setMaxPlayers(6)">6</button>
        <button class="maxp-btn" data-n="7" onclick="setMaxPlayers(7)">7</button>
        <button class="maxp-btn active" data-n="8" onclick="setMaxPlayers(8)">8</button>
      </div>
    </div>
    <div class="rrow-cfg">
      <label>Rundy na gracza</label>
      <input type="number" id="rpp" min="1" max="10" value="3">
    </div>
    <button class="btn btn-lit" id="btn-start" onclick="hostStart()">Rozpocznij grę ▶</button>
  </div>
  <div id="lob-guest" style="display:none;">
    <div class="conn" id="lob-guest-conn"><span class="cdot dwait"></span>Czekaj aż host rozpocznie grę…</div>
  </div>
  <div class="conn"><span class="cdot dok"></span><span id="sync-st">Połączono</span></div>
  <button class="btn btn-dim" style="color:var(--c0);border-color:var(--c0)44;margin-top:4px" onclick="leaveGame()">← Opuść grę</button>
</div>

<!-- ══ VOTE ══ -->
<div class="scr" id="s-vote">
  <div class="sbar" id="sb-v"></div>
  <div class="qcard" id="qc-v">
    <div class="qmeta" id="v-meta"></div>
    <div class="qabout" id="v-about"></div>
    <div class="qtext" id="v-q"></div>
  </div>
  <div class="ans-list" id="v-ans"></div>
  <div class="vstatus" id="v-st"></div>
  <button class="btn btn-lit" id="btn-vote" style="display:none" onclick="confirmVote()">Zatwierdź odpowiedź ✓</button>
  <button class="btn btn-dim" id="btn-swap-v" style="display:none" onclick="swapQuestion()"></button>
  <button class="btn btn-dim" style="font-size:12px;padding:10px;color:var(--c0);border-color:var(--c0)33;margin-top:4px" onclick="leaveGame()">← Opuść grę</button>
</div>

<!-- ══ WAIT ══ -->
<div class="scr" id="s-wait">
  <div class="sbar" id="sb-w"></div>
  <div class="wmid">
    <div class="wav pulse" id="w-av"></div>
    <div class="wtitle" id="w-title"></div>
    <div class="wdesc" id="w-desc"></div>
    <div class="wq" id="w-q"></div>
  </div>
  <button class="btn btn-dim" style="font-size:12px;padding:10px;color:var(--c0);border-color:var(--c0)33" onclick="leaveGame()">← Opuść grę</button>
</div>

<!-- ══ SUBJECT ══ -->
<div class="scr" id="s-subj">
  <div class="sbar" id="sb-sj"></div>
  <div class="qcard" id="qc-sj">
    <div class="qmeta" id="sj-meta"></div>
    <div class="qabout" id="sj-about" style="font-size:15px;font-weight:600;margin-bottom:8px;"></div>
    <div class="qtext" id="sj-q"></div>
  </div>
  <div class="ans-list" id="sj-ans"></div>
  <button class="btn btn-lit" id="btn-sj" style="display:none" onclick="submitSJ()">Pokaż wyniki! 🎉</button>
  <button class="btn btn-dim" id="btn-swap-sj" style="display:none" onclick="swapQuestionSJ()"></button>
</div>

<!-- ══ REVEAL ══ -->
<div class="scr" id="s-reveal">
  <div class="sbar" id="sb-rv"></div>
  <div id="rv-banner"></div>
  <div class="qcard" id="qc-rv">
    <div class="qmeta" id="rv-meta"></div>
    <div class="qabout" id="rv-about"></div>
    <div class="qtext" id="rv-q"></div>
  </div>
  <div class="ans-list" id="rv-ans"></div>
  <div class="rcard" id="rv-res"></div>
  <div id="rv-btn"></div>
</div>

<!-- ══ END ══ -->
<div class="scr" id="s-end">
  <div style="text-align:center;padding-top:12px">
    <div style="font-size:48px;margin-bottom:4px">🏆</div>
    <div class="logo" style="font-size:42px">Koniec!</div>
  </div>
  <div class="podium" id="end-pod"></div>
  <div class="rcard" id="end-sc"></div>
  <div id="end-btns" style="display:flex;flex-direction:column;gap:8px;"></div>
</div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   📚  BAZA PYTAŃ — dodawaj tutaj!
   Format: { q: "Pytanie o [imię]?", a: ["Opcja 1","Opcja 2","Opcja 3"] }
═══════════════════════════════════════════════════════════════ */
const QS=[
  {q:"Jak [imię] najchętniej spędza wolny weekend?",                  a:["Leniuchując w domu","Wychodząc ze znajomymi","Aktywnie – sport lub wycieczka"]},
  {q:"Co najbardziej stresuje [imię] w codziennym życiu?",            a:["Praca / szkoła","Relacje z innymi","Brak pieniędzy"]},
  {q:"Gdyby [imię] wygrał/a milion złotych, co zrobi jako pierwsze?", a:["Odłoży lub zainwestuje","Wyjedzie w podróż marzeń","Kupi coś dużego"]},
  {q:"Jaką rolę [imię] zwykle pełni w grupie znajomych?",            a:["Dusza towarzystwa","Spokojny obserwator","Organizator i lider"]},
  {q:"Co [imię] ceni najbardziej w życiu?",                          a:["Lojalność i zaufanie","Wolność i niezależność","Bezpieczeństwo i stabilność"]},
  {q:"Jak [imię] reaguje na konstruktywną krytykę?",                 a:["Bierze ją bardzo do serca","Analizuje spokojnie","Odpiera – wie swoje"]},
  {q:"Jaki film najchętniej obejrzy [imię] wieczorem?",              a:["Komedia lub romans","Thriller lub horror","Dokument lub dramat"]},
  {q:"Jak [imię] podejmuje ważne decyzje?",                          a:["Impulsywnie – działa od razu","Długo rozważa za i przeciw","Pyta bliskich o zdanie"]},
  {q:"Czym [imię] najczęściej irytuje innych?",                      a:["Spóźnianiem się","Mówieniem bez końca","Zamknięciem się w sobie"]},
  {q:"Co [imię] robi gdy jest zły/a?",                               a:["Wybucha i mówi wprost","Milczy i dąsa się","Zamyka się i potrzebuje czasu"]},
  {q:"Jak [imię] zachowuje się na głośnej imprezie?",                a:["Bawi się do białego rana","Wychodzi po 2 godzinach","Siedzi z jedną osobą cały wieczór"]},

/* ── ODMIANA PŁCI ── */
// Heuristic: Polish feminine names typically end in 'a' or 'i'
// Masculine exceptions ending in 'a': Kuba, Sasha, Nikita, Barnaba, Kosma, Bonawentura, Jarema
const MASC_ENDING_A=['kuba','sasha','nikita','barnaba','kosma','bonawentura','jarema','misza','sasza','ilia','borja'];
function isFeminine(name){
  if(!name)return false;
  const n=name.toLowerCase().trim();
  if(MASC_ENDING_A.some(m=>n===m))return false;
  return n.endsWith('a')||n.endsWith('ia');
}
// Returns gendered form: genderWord(name, 'Trafiłeś/aś') → 'Trafiłaś' or 'Trafiłeś'
// Usage: gW(name, masc, fem)
function gW(name,masc,fem){return isFeminine(name)?fem:masc;}

// ── Firebase REST ──
async function fbGet(path){
  const r=await fetch(`${DB_URL}/${path}.json`);
  if(r.status===401||r.status===403){
    throw new Error('PERMISSION_DENIED – sprawdź reguły Firebase ('+r.status+')');
  }
  if(!r.ok)throw new Error('GET '+r.status);
  return r.json();
}
async function fbPut(path,data){
  const r=await fetch(`${DB_URL}/${path}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(r.status===401||r.status===403)throw new Error('PERMISSION_DENIED '+r.status);
  if(!r.ok)throw new Error('PUT '+r.status);
  return r.json();
}
async function fbPost(path,data){
  const r=await fetch(`${DB_URL}/${path}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error('POST '+r.status);
  return r.json();
}
async function fbPatch(path,data){
  const r=await fetch(`${DB_URL}/${path}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error('PATCH '+r.status);
  return r.json();
}

// ── Normalize GS (Firebase drops empty arrays/objects → null) ──
function norm(gs){
  if(!gs)return gs;
  // Firebase returns arrays-with-nulls as plain objects — convert back to real arrays
  const toArr4 = v => {
    if(Array.isArray(v)) { while(v.length<8) v.push(null); return v; }
    if(v && typeof v==='object') {
      const a=[null,null,null,null,null,null,null,null];
      Object.keys(v).forEach(k=>{ const n=parseInt(k); if(n>=0&&n<8) a[n]=v[k]; });
      return a;
    }
    return [null,null,null,null,null,null,null,null];
  };
  const toArr = v => {
    if(Array.isArray(v)) return v;
    if(v && typeof v==='object') {
      const max=Math.max(0,...Object.keys(v).map(Number))+1;
      const a=new Array(max).fill(0);
      Object.keys(v).forEach(k=>{ a[parseInt(k)]=v[k]; });
      return a;
    }
    return [];
  };
  gs.players  = toArr4(gs.players);
  gs.subjects = toArr(gs.subjects);
  gs.qSeq     = toArr(gs.qSeq);
  gs.votes    = gs.votes || {};
  gs.ready      = gs.ready || {};
  gs.maxPlayers = gs.maxPlayers || 8;
  // Normalize vote keys AND values to integers
  if(gs.votes && typeof gs.votes==='object'){
    const v={};
    Object.keys(gs.votes).forEach(k=>{ v[parseInt(k)]=parseInt(gs.votes[k]); });
    gs.votes=v;
  }
  if(gs.sa!==undefined && gs.sa!==null && gs.sa!==-1) gs.sa=parseInt(gs.sa);
  else if(gs.sa===undefined||gs.sa===null) gs.sa=-1;
  if(gs.ri===undefined||gs.ri===null) gs.ri=0;
  if(gs.rt===undefined||gs.rt===null) gs.rt=0;
  return gs;
}

let _sjPick=null;

function startPoll(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!gameId)return;
    try{
      const gs=await fbGet(`games/${gameId}`);
      if(!gs){clearInterval(pollTimer);return;}
      GS=norm(gs);

      // Host only: manage phase transitions
      if(isHost){
        const si=GS.subjects[GS.ri]??0;

        // Auto-start: all players ready in lobby
        if(GS.phase==='lobby'){
          const filled=GS.players.filter(Boolean);
          const ready=GS.ready||{};
          const allReady=filled.length>=2 && GS.players.every((p,i)=>!p||!!ready[i]);
          if(allReady){
            if(!_allVotedAt) _allVotedAt=Date.now();
            const remaining=Math.ceil((3000-(Date.now()-_allVotedAt))/1000);
            if(remaining>0){
              if($('sync-st'))$('sync-st').textContent=`Wszyscy gotowi! Start za ${remaining}s…`;
            } else {
              _allVotedAt=null;
              const rpp=Math.max(1,parseInt($('rpp')?.value)||3);
              const idx=GS.players.map((p,i)=>p?i:null).filter(i=>i!==null);
              let sub=[];for(let r=0;r<rpp;r++)sub=[...sub,...shuf([...idx])];
              let qp=shuf(QS.map((_,i)=>i));
              while(qp.length<sub.length)qp=[...qp,...shuf(QS.map((_,i)=>i))];
              GS={...GS,phase:'voting',subjects:sub,qSeq:qp.slice(0,sub.length),rt:sub.length,ri:0,votes:{},sa:-1,ready:{}};
              await writeGS();
            }
          } else {
            _allVotedAt=null;
          }
        }

        if(GS.phase==='voting'){
          // All GUESSERS (not subject) voted → advance to subject phase
          const guessers=GS.players.filter((p,i)=>p&&i!==si);
          const allGuessersVoted=guessers.every((p,gi)=>{
            const pi=GS.players.indexOf(p); return GS.votes[pi]!==undefined;
          });
          if(allGuessersVoted && guessers.length>0){
            if(!_allVotedAt) _allVotedAt=Date.now();
            const remaining=Math.ceil((3000-(Date.now()-_allVotedAt))/1000);
            if(remaining>0){
              if($('sync-st'))$('sync-st').textContent=`Wszyscy zagłosowali! Za ${remaining}s…`;
            } else {
              _allVotedAt=null;
              await fbPatch(`games/${gameId}`,{phase:'subject'});
              GS.phase='subject';
            }
          } else {
            _allVotedAt=null;
            const done=guessers.filter((p,gi)=>{const pi=GS.players.indexOf(p);return GS.votes[pi]!==undefined;}).length;
            if($('sync-st'))$('sync-st').textContent=`Odpowiedzi: ${done}/${guessers.length}`;
          }
        }

        if(GS.phase==='subject'){
          // Subject answered (sa set) → advance to reveal and award points
          if(GS.sa!==-1){
            if(!_allVotedAt) _allVotedAt=Date.now();
            const remaining=Math.ceil((2000-(Date.now()-_allVotedAt))/1000);
            if(remaining<=0){
              _allVotedAt=null;
              const next=norm(dc(GS));
              next.phase='reveal';
              next.players.forEach((p,i)=>{
                next.players.forEach((p,i)=>{
                  if(p&&i!==si&&next.votes[i]==next.sa){
                    next.players[i].pts++;   // guesser gets 1 pt
                    next.players[si].pts++;  // subject gets 1 pt per correct guesser
                  }
                });
              });
              GS=next;
              await writeGS();
            }
          }
        }
      }

      render();
      if(GS.phase!=='voting' && $('sync-st'))$('sync-st').textContent='Połączono';
    }catch(e){
      console.error('poll error:',e.message);
      if($('sync-st'))$('sync-st').textContent='Błąd: '+e.message;
    }
  },POLL_MS);
}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

  await fbPut(`games/${gameId}`,GS);
}

function renderSlots(gs,name){
  $('slots-sub').textContent='Wybierz swój slot';

  const ni=$('slots-name-inp');
  if(ni && ni.value==='' && name) ni.value=name;

      <div class="slot-pts">${p?p.pts+' pkt':'Kliknij aby dołączyć'}</div>

async function claimSlot(slot,name){
  try{
    const gs=await fbGet(`games/${gameId}`);
    if(gs.players[slot]&&mySlot!==slot){alert('Ten slot jest już zajęty!');GS=norm(gs);renderSlots(norm(gs),name);return;}
    // Check for duplicate name
    const normalName=(name||'Gracz').trim().toLowerCase();
    const duplicate=gs.players.some((p,i)=>p&&i!==slot&&p.name.trim().toLowerCase()===normalName);
    if(duplicate){
      alert(`Imię "${name}" jest już zajęte przez innego gracza. Wpisz inne imię.`);
      return;
    }
    GS=norm(dc(gs));
    GS.players[slot]={name:name||'Gracz',pts:gs.players[slot]?.pts??0};
    await fbPut(`games/${gameId}`,GS);
    mySlot=slot;isHost=(slot===0);
    sessionStorage.setItem('ego_sess',JSON.stringify({gameId,mySlot}));
    renderLobby();show('s-lobby');
  }catch(e){alert('Błąd – spróbuj ponownie');}
}

  } else {
    $('lob-host').style.display='none';
    $('lob-guest').style.display='block';
    const readyCount=activePlayers.filter((p,i)=>p&&!!ready[i]).length;
    $('lob-guest-conn').innerHTML=allReady
      ? `<span class="cdot dok"></span>Wszyscy gotowi! Gra startuje za chwilę…`
      : `<span class="cdot dwait"></span>Gotowych: ${readyCount}/${filled} — czekaj na pozostałych`;
  }
  show('s-lobby');
}

async function toggleReady(){
  if(mySlot===null)return;
  try{
    const gs=await fbGet(`games/${gameId}`);
    GS=norm(dc(gs));
    if(!GS.ready) GS.ready={};
    GS.ready[mySlot]=!GS.ready[mySlot];
    await fbPatch(`games/${gameId}`,{ready:GS.ready});
    renderLobby();
  }catch(e){console.error('toggleReady',e);}
}

async function changeName(){
  const newName=$('lob-name-inp').value.trim();
  if(!newName||mySlot===null)return;
  // Check duplicate
  const norm2=newName.toLowerCase();
  const dup=GS.players.some((p,i)=>p&&i!==mySlot&&p.name.trim().toLowerCase()===norm2);
  if(dup){alert(`Imię "${newName}" jest już zajęte. Wybierz inne.`);return;}
  try{
    const patch={};
    patch[`players/${mySlot}/name`]=newName;
    if(!GS.ready) GS.ready={};
    GS.ready[mySlot]=false;
    patch[`ready/${mySlot}`]=false;
    await fbPatch(`games/${gameId}`,patch);
    GS.players[mySlot].name=newName;
    $('lob-name-inp').value='';
    renderLobby();
  }catch(e){console.error('changeName',e);}
}

async function leaveGame(){
  if(!confirm('Na pewno chcesz opuścić grę?'))return;
  try{
    if(mySlot!==null){
      const patch={};
      patch[`players/${mySlot}`]=null;
      patch[`ready/${mySlot}`]=null;
      await fbPatch(`games/${gameId}`,patch);
    }
  }catch(e){}
  stopPoll();
  sessionStorage.removeItem('ego_sess');
  sessionStorage.removeItem('ego_name');
  gameId=null; mySlot=null; isHost=false; GS=null;
  _localVote=null; _confirmedVote=null; _sjPick=null; _lastRi=null;
  const name=($('inp-name')?.value||'').trim();
  name ? show('s-home') : show('s-home');
}

// ── HOST START ──
async function hostStart(){
  if(!isHost)return;
  const ps=GS.players.filter(Boolean);
  if(ps.length<2){alert('Potrzeba co najmniej 2 graczy!');return;}
  const ready=GS.ready||{};
  const allReady=GS.players.every((p,i)=>!p||!!ready[i]);
  if(!allReady){alert('Nie wszyscy gracze są gotowi!');return;}
  const rpp=Math.max(1,parseInt($('rpp').value)||3);
  const idx=GS.players.map((p,i)=>p?i:null).filter(i=>i!==null);
  let sub=[];for(let r=0;r<rpp;r++)sub=[...sub,...shuf([...idx])];
  let qp=shuf(QS.map((_,i)=>i));
  while(qp.length<sub.length)qp=[...qp,...shuf(QS.map((_,i)=>i))];
  GS={...GS,phase:'voting',subjects:sub,qSeq:qp.slice(0,sub.length),rt:sub.length,ri:0,votes:{},sa:-1,ready:{}};
  await writeGS();render();
}

// ── RENDER ──
function render(){
  if(!GS)return;

  // Reset local per-round state whenever round changes (for all players, not just host)
  const currentRi = GS.ri ?? 0;
  if(_lastRi !== null && _lastRi !== currentRi){
    _localVote=null; _confirmedVote=null; _sjPick=null; _sjPending=null; _swapsLeft=2; _sjSwapsLeft=2;
  }
  _lastRi = currentRi;

  // If on slots screen, keep updating it
  if($('s-slots').classList.contains('on')){
    renderSlots(GS,sessionStorage.getItem('ego_name')||'Gracz');
    return;
  }
  // Always follow the game phase — even if currently on lobby screen
  switch(GS.phase){
    case'lobby':  renderLobby();  break;
    case'voting': renderVoting(); break;
    case'subject':renderSubj();   break;
    case'reveal': renderReveal(); break;
    case'ended':  renderEnd();    break;
  }
}

// ── helpers ──
const SI=()=>GS.subjects[GS.ri]??0;
const SP=()=>GS.players[SI()];
const CQ=()=>QS[GS.qSeq[GS.ri]];
const amSJ=()=>mySlot===SI();

function mkSbar(id){
  const el=$(id);if(!el||!GS)return;
  el.innerHTML=GS.players.map((p,i)=>p
    ?`<div class="sbi"><div class="sbi-n" style="color:${C(i)}">${p.name}</div><div class="sbi-v" style="color:${C(i)}">${p.pts}</div></div>`
    :''
  ).join('');
}

function buildAns(cid,answers,locked,chosen,correct,cb){
  const c=$(cid);if(!c)return;c.innerHTML='';
  answers.forEach((a,i)=>{
    const btn=document.createElement('button');
    btn.className='abtn'+(locked||correct!==null?' locked':'');
    if(correct!==null&&i==correct)btn.classList.add('correct');
    if(locked&&i===chosen)btn.classList.add('chosen');
    btn.innerHTML=`<div class="anum">${i+1}</div><span>${a}</span>`;
    if(!locked&&correct===null&&cb)btn.onclick=()=>cb(i);
    c.appendChild(btn);
  });
}

function setWait(color,name,title,desc,qt){
  const av=$('w-av');
  av.style.cssText=`width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:32px;background:${color}22;color:${color};margin:0 auto;`;
  av.textContent=name.charAt(0).toUpperCase();
  $('w-title').textContent=title;
  $('w-desc').textContent=desc;
  $('w-q').textContent=qt;
}

// ── VOTING (guessers only) ──
let _localVote = null;
let _confirmedVote = null;

function renderVoting(){
  const q=CQ();if(!q)return;
  const si=SI(),sp=SP();
  mkSbar('sb-v'); mkSbar('sb-w');
  $('qc-v').style.setProperty('--ac',C(si));
  const ri=GS.ri+1,tot=GS.rt;

  // Subject sees question + locked answers while others vote
  if(amSJ()){
    const guessers=GS.players.filter((p,i)=>p&&i!==si);
    const done=guessers.filter((p,gi)=>{
      const pi=GS.players.indexOf(p); return GS.votes[pi]!==undefined;
    }).length;
    mkSbar('sb-v');
    $('qc-v').style.setProperty('--ac',C(si));
    $('v-meta').textContent=`Runda ${ri} / ${tot}`;
    $('v-about').innerHTML=`To pytanie jest o <strong style="color:${C(si)}">Tobie</strong>!`;
    $('v-q').textContent=q.q.replace('[imię]',sp.name);
    // Show answers locked — subject can see options but can't pick yet
    buildAns('v-ans',q.a,true,null,null,null);
    $('btn-vote').style.display='none';
    $('v-st').innerHTML=`
      <div style="background:var(--card);border:1.5px solid var(--rim);border-radius:12px;padding:14px 16px;text-align:center;margin-top:4px">
        <div style="font-size:20px;margin-bottom:6px">🤫</div>
        <div style="font-weight:600;font-size:14px;margin-bottom:4px">Poczekaj na pozostałych!</div>
        <div style="color:var(--muted);font-size:13px">Twoja kolej po nich — zagłosowało ${done} z ${guessers.length}</div>
      </div>`;
    show('s-vote'); return;
  }
  if(mySlot===null||!GS.players[mySlot]){
    setWait('#888','?','Trwa głosowanie…','Czekaj',q.q.replace('[imię]',sp.name));
    show('s-wait'); return;
  }

  $('v-meta').textContent=`Runda ${ri} / ${tot}`;
  $('v-about').innerHTML=`Pytanie o: <strong style="color:${C(si)}">${sp.name}</strong>`;
  $('v-q').textContent=q.q.replace('[imię]',sp.name);

  const fbVote=GS.votes[mySlot];
  const voted=fbVote!==undefined||_confirmedVote!==null;
  const shownVote=fbVote!==undefined?fbVote:(_confirmedVote!==null?_confirmedVote:_localVote);

  const myName=GS.players[mySlot]?.name||'';

  if(voted){
    buildAns('v-ans',q.a,true,shownVote,null,null);
    $('btn-vote').style.display='none';
    $('btn-swap-v').style.display='none';
    const guessers=GS.players.filter((p,i)=>p&&i!==si);
    const done=guessers.filter((p,gi)=>{const pi=GS.players.indexOf(p);return GS.votes[pi]!==undefined;}).length;
    $('v-st').innerHTML=`<span style="color:var(--c2)">✓ ${gW(myName,'Zatwierdziłeś','Zatwierdziłaś')}!</span> Czekaj na pozostałych… (${done}/${guessers.length})`;
  } else {
    buildAns('v-ans',q.a,false,null,null,i=>{
      _localVote=i; renderVoting();
    });
    if(_localVote!==null){
      const btns=document.querySelectorAll('#v-ans .abtn');
      btns.forEach((b,i)=>{if(i==_localVote){b.classList.add('chosen');b.querySelector('.anum').style.background='var(--text)';b.querySelector('.anum').style.color='var(--bg)';}});
      $('btn-vote').style.display='block';
      $('v-st').textContent='Możesz zmienić wybór lub zatwierdź';
    } else {
      $('btn-vote').style.display='none';
      $('v-st').textContent='Jak twoim zdaniem odpowie?';
    }
    // Swap button — visible only before confirming
    const sb=$('btn-swap-v');
    sb.style.display='block';
    sb.textContent=_swapBtnLabel(_swapsLeft);
    sb.disabled=_swapsLeft<=0;
    sb.style.opacity=_swapsLeft>0?'1':'0.4';
  }
  show('s-vote');
}

// ── SWAP QUESTION ──
function _doSwap(onDone){
  const used=GS.qSeq||[];
  const available=QS.map((_,i)=>i).filter(i=>!used.includes(i));
  // If pool exhausted, allow repeats from non-current
  const pool=available.length>0 ? available : QS.map((_,i)=>i).filter(i=>i!==GS.qSeq[GS.ri]);
  if(!pool.length)return; // no swap possible
  const newQIdx=pool[Math.floor(Math.random()*pool.length)];
  // Replace current question in qSeq
  const newSeq=[...GS.qSeq];
  newSeq[GS.ri]=newQIdx;
  GS.qSeq=newSeq;
  // Push to Firebase (host will broadcast on next poll, but update locally immediately)
  fbPatch(`games/${gameId}`,{qSeq:newSeq}).catch(()=>{});
  onDone();
}

function swapQuestion(){
  if(_swapsLeft<=0)return;
  _swapsLeft--;
  _localVote=null; _confirmedVote=null;
  _doSwap(()=>renderVoting());
}

function swapQuestionSJ(){
  if(_sjSwapsLeft<=0)return;
  _sjSwapsLeft--;
  _sjPending=null;
  _doSwap(()=>renderSubj());
}

function _swapBtnLabel(left){ return left>0 ? `🔄 Zmień pytanie (zostało: ${left})` : '🔄 Brak wymian'; }

function confirmVote(){
  if(_localVote===null)return;
  _confirmedVote=_localVote;
  $('btn-vote').style.display='none';
  buildAns('v-ans',QS[GS.qSeq[GS.ri]].a,true,_confirmedVote,null,null);
  const myName=GS&&mySlot!==null?GS.players[mySlot]?.name||'':'';
  $('v-st').innerHTML=`<span style="color:var(--c2)">✓ ${gW(myName,'Zatwierdziłeś','Zatwierdziłaś')}! Czekaj na pozostałych…</span>`;
  castVote(_confirmedVote);
}

async function castVote(ans){
  try{
    const patch={};
    patch[`votes/${mySlot}`]=ans;
    await fbPatch(`games/${gameId}`,patch);
    GS.votes[mySlot]=ans;
    render();
  }catch(e){console.error('castVote',e);}
}

// ── SUBJECT answers last ──
let _sjPending=null;
let _swapsLeft=2;    // resets each round, shared between voter and subject screens
let _sjSwapsLeft=2;  // for subject screen

function renderSubj(){
  const q=CQ();if(!q)return;
  const si=SI(),sp=SP();
  mkSbar('sb-sj'); mkSbar('sb-w');
  $('qc-sj').style.setProperty('--ac',C(si));
  const ri=GS.ri+1,tot=GS.rt;

  // Non-subject players wait
  if(!amSJ()){
    setWait(C(si),sp.name,`${sp.name} teraz odpowiada…`,
      'Zaraz zobaczysz wyniki!',
      q.q.replace('[imię]',sp.name));
    show('s-wait'); return;
  }

  $('sj-meta').textContent=`Runda ${ri} / ${tot} — To pytanie jest o Tobie!`;
  $('sj-about').textContent=`Odpowiedz szczerze, ${sp.name}!`;
  $('sj-q').textContent=q.q.replace('[imię]',sp.name);

  if(_sjPending!==null){
    buildAns('sj-ans',q.a,true,_sjPending,null,null);
    $('btn-sj').style.display='block';
    $('btn-swap-sj').style.display='none';
  } else {
    buildAns('sj-ans',q.a,false,null,null,i=>{
      _sjPending=i;
      buildAns('sj-ans',q.a,true,i,null,null);
      const btns=document.querySelectorAll('#sj-ans .abtn');
      btns.forEach((b,bi)=>{
        b.classList.remove('locked');
        if(bi!=i){b.onclick=()=>{_sjPending=bi;renderSubj();}}
      });
      $('btn-sj').style.display='block';
    });
    $('btn-sj').style.display='none';
    // Swap button — only before answering
    const sb=$('btn-swap-sj');
    sb.style.display='block';
    sb.textContent=_swapBtnLabel(_sjSwapsLeft);
    sb.disabled=_sjSwapsLeft<=0;
    sb.style.opacity=_sjSwapsLeft>0?'1':'0.4';
  }
  show('s-subj');
}

async function submitSJ(){
  if(_sjPending===null)return;
  try{
    const patch={sa:_sjPending};
    await fbPatch(`games/${gameId}`,patch);
    GS.sa=_sjPending;
    render();
  }catch(e){console.error('submitSJ',e);}
}


// ── REVEAL ──
function renderReveal(){
  const q=CQ();if(!q)return;
  const si=SI(),sp=SP(),correct=GS.sa;
  mkSbar('sb-rv');
  $('qc-rv').style.setProperty('--ac',C(si));
  const ri=GS.ri+1,tot=GS.rt;
  $('rv-meta').textContent=`Runda ${ri} / ${tot}`;
  $('rv-about').innerHTML=`Odpowiedź <strong style="color:${C(si)}">${sp.name}</strong>:`;
  $('rv-q').textContent=q.q.replace('[imię]',sp.name);

  // ── PERSONAL RESULT BANNER ──
  const myVote=GS.votes[mySlot];
  const amI=mySlot!==null&&GS.players[mySlot];
  const iAmSubject=amSJ();
  let bannerHtml='';

  if(amI && !iAmSubject && myVote!==undefined){
    const hit=myVote==correct;
    const myName=GS.players[mySlot]?.name||'';
    bannerHtml=`
    <div style="
      border-radius:18px;
      padding:24px 20px;
      background:${hit?'#052e16':'#450a0a'};
      border:3px solid ${hit?'#16a34a':'#dc2626'};
      text-align:center;
    ">
      <div style="font-size:56px;margin-bottom:8px">${hit?'🎉':'😬'}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;color:${hit?'#4ade80':'#f87171'};line-height:1">
        ${hit?gW(myName,'TRAFIŁEŚ!','TRAFIŁAŚ!'):'PUDŁO!'}
      </div>
      <div style="font-size:14px;color:${hit?'#86efac':'#fca5a5'};margin-top:10px;line-height:1.5">
        ${hit
          ? `Twoja odpowiedź zgadza się z odpowiedzią ${sp.name} 🎯<br><strong>+1 punkt dla Ciebie!</strong>`
          : `${gW(myName,'Wybrałeś','Wybrałaś')}: <strong style="color:#fff">${q.a[myVote]}</strong><br>Poprawna: <strong style="color:#4ade80">${q.a[correct]}</strong>`
        }
      </div>
    </div>`;
  } else if(iAmSubject){
    const guessers=GS.players.filter((p,i)=>p&&i!==si);
    const correct_cnt=guessers.filter((p,gi)=>{
      const pi=GS.players.indexOf(p);
      return GS.votes[pi]==correct;
    }).length;
    const subjectPts=correct_cnt; // 1 pt per correct guesser
    bannerHtml=`
    <div style="
      border-radius:18px;padding:24px 20px;
      background:${correct_cnt>0?'#1e1b4b':'#1a1a24'};
      border:3px solid ${correct_cnt>0?'#818cf8':'#3f3f50'};
      text-align:center;
    ">
      <div style="font-size:48px;margin-bottom:8px">${correct_cnt===guessers.length?'🏆':correct_cnt>0?'🎯':'😮'}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:${correct_cnt>0?'#a5b4fc':'#6b6b80'};line-height:1">
        TO TWOJE PYTANIE
      </div>
      <div style="font-size:14px;color:#c7d2fe;margin-top:10px;line-height:1.6">
        <strong style="color:#fff">${correct_cnt} z ${guessers.length}</strong> graczy odgadło Twoją odpowiedź<br>
        ${correct_cnt>0
          ? `<strong style="color:#a5b4fc;font-size:16px">+${subjectPts} ${subjectPts===1?'punkt':'punkty'} dla Ciebie!</strong>`
          : `<span style="color:#6b6b80">Nikt nie trafił — 0 punktów</span>`}
      </div>
    </div>`;
  }
  $('rv-banner').innerHTML=bannerHtml;

  // ── ANSWERS with voter chips ──
  const ac=$('rv-ans');ac.innerHTML='';
  q.a.forEach((a,i)=>{
    const btn=document.createElement('button');
    const isCorrect=i==correct;
    const isMyVote=!iAmSubject&&i==myVote;
    btn.className='abtn locked'+(isCorrect?' correct':'');
    if(isMyVote&&!isCorrect){
      btn.style.cssText='border-color:#dc2626;background:#450a0a;pointer-events:none;cursor:default;';
    }
    const myTag=isMyVote
      ? `<span style="margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:${isCorrect?'#16a34a':'#dc2626'};color:#fff">${isCorrect?'TY ✓':'TY ✗'}</span>`
      : '';
    btn.innerHTML=`<div class="anum">${i+1}</div><span>${a}</span>${myTag}`;
    const voters=GS.players.filter((p,pi)=>p&&pi!==si&&GS.votes[pi]==i);
    if(voters.length){
      const ch=document.createElement('div');ch.className='voter-chips';
      voters.forEach(v=>{const pi=GS.players.indexOf(v),hit=i==correct;
        ch.innerHTML+=`<span class="vchip" style="background:${C(pi)}22;color:${C(pi)};border:1px solid ${C(pi)}44">${hit?'✓':'✗'} ${v.name}</span>`;
      });
      btn.appendChild(ch);
    }
    ac.appendChild(btn);
  });

  $('rv-res').innerHTML=`<div class="rctitle">Wyniki rundy</div>

    GS.players.map((p,i)=>{if(!p||i===si)return'';const hit=GS.votes[i]==correct;
      return`<div class="rvrow${i===mySlot?' style="background:var(--rim);border-radius:8px;padding:9px 8px;margin:0 -8px"':''}"><div class="rvl"><div class="rvdot" style="background:${C(i)}"></div><span${i===mySlot?' style="font-weight:700"':''}>${p.name}${i===mySlot?' (ty)':''}</span></div><span class="badge ${hit?'b-yes':'b-no'}">${hit?'+1 pkt ✓':'Pudło ✗'}</span></div>`;}).join('');

  const isLast=GS.ri+1>=GS.rt;
  $('rv-btn').innerHTML=`<button class="btn btn-lit" onclick="nextRound()">${isLast?'🏆 Wyniki końcowe':'Następna runda →'}</button>`;
  show('s-reveal');
}

async function nextRound(){
  try{
    const gs=await fbGet(`games/${gameId}`);
    GS=norm(dc(gs));
    if(GS.ri+1>=GS.rt){GS.phase='ended';}
    else{GS.ri++;GS.votes={};GS.sa=-1;GS.phase='voting';_localVote=null;_confirmedVote=null;_sjPick=null;_sjPending=null;_swapsLeft=2;_sjSwapsLeft=2;_allVotedAt=null;}
    await writeGS();render();
  }catch(e){console.error('nextRound',e);}
}

// ── END ──
function renderEnd(){
  const ps=[...GS.players.entries()].filter(([,p])=>p).map(([i,p])=>({...p,i})).sort((a,b)=>b.pts-a.pts);
  const med=['🥇','🥈','🥉',''],h=[120,90,70,55];
  $('end-pod').innerHTML=ps.map((p,rank)=>
    `<div class="podcol"><div class="podbar" style="height:${h[rank]||40}px;background:${C(p.i)};color:#fff;">${med[rank]||''}</div><div style="font-size:12px;font-weight:600;color:${C(p.i)}">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.pts} pkt</div></div>`
  ).join('');
  $('end-sc').innerHTML='<div class="rctitle">Wyniki końcowe</div>'+
    ps.map(p=>`<div class="rvrow"><div class="rvl"><div class="rvdot" style="background:${C(p.i)}"></div><span>${p.name}</span></div><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:${C(p.i)}">${p.pts}</div></div>`).join('');
  const eb=$('end-btns');eb.innerHTML='';
  if(isHost){
    const b=document.createElement('button');b.className='btn btn-lit';b.textContent='Zagraj ponownie';
    b.onclick=async()=>{
      GS={...GS,phase:'lobby',subjects:[],qSeq:[],ri:0,votes:{},sa:-1};
      GS.players.forEach(p=>{if(p)p.pts=0;});
      await writeGS();render();
    };
    eb.appendChild(b);
  }
  const h2=document.createElement('button');h2.className='btn btn-dim';h2.textContent='← Wyjdź';
  h2.onclick=()=>leaveGame();
  eb.appendChild(h2);
  show('s-end');
}

// ── INIT ──
(async()=>{

  if(sess){
    try{
      const{gameId:gid,mySlot:ms}=JSON.parse(sess);
      const gs=await fbGet(`games/${gid}`);

    }catch(e){}
  }
  show('s-home');
  // Also fix theme-btn icon on s-actions
  const tb2=document.querySelector('#s-actions .theme-btn');
  if(tb2){
    const saved=localStorage.getItem('ego_theme');
    const isDark=saved?saved==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;
    tb2.textContent=isDark?'☀️':'🌙';
  }
})();

function updateHomeActions(){ /* actions always visible */ }

</script>
